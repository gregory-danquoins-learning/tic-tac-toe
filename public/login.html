<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion - Morpion</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      margin: 0;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
      font-family: sans-serif;
    }

    .login-box {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      padding: 0.5rem;
      font-size: 1rem;
      width: 200px;
      margin-bottom: 1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: none;
      background-color: #1976d2;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Entrez votre prénom</h2>
    <input type="text" id="username" placeholder="Prénom" />
    <br />
    <button onclick="connect()">Connexion</button>
  </div>

  <script>
    function connect() {
      const name = document.getElementById('username').value.trim();
      if (!name) {
        alert("Veuillez entrer un prénom.");
        return;
      }

      localStorage.setItem('username', name);

      const socket = new WebSocket(`ws://${location.host}`);

      socket.addEventListener('open', () => {
        socket.send(JSON.stringify({ type: 'login', data: { name } }));
        socket.close();
        window.location.href = '/lobby.html';
      });

      socket.addEventListener('error', (err) => {
        console.error("Erreur WebSocket", err);
        alert("Erreur de connexion WebSocket.");
      });
    }
  </script>
</body>
</html>
